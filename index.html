      </Field>
      {f.añoNuevo&&<div style={{marginTop:14,padding:"12px 16px",background:"#080818",borderRadius:8,border:"1px solid #1E1E50",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{fontFamily:"JetBrains Mono",fontSize:11,color:"#5A6A90"}}>Cambio registrado</div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontFamily:"Work Sans",fontWeight:700,color:"#F0B429",fontSize:16}}>{añoActual}</span>
          <span style={{color:"#5A6A90"}}>→</span>
          <span style={{fontFamily:"Work Sans",fontWeight:700,color:"#0BCDD3",fontSize:16}}>{f.añoNuevo}</span>
        </div>
      </div>}
      <MFooter onClose={onClose} onSave={()=>ok&&onSave({añoAnterior:añoActual,añoNuevo:parseInt(f.añoNuevo),fecha:f.fecha,motivo:f.motivo,id:uid()})} label="Registrar Cambio de Año" disabled={!ok}/>
    </Modal>
  );
}

function VistaObra({ obraData, onUpdate }) {
  const { obra, unidad, plaza } = obraData;
  const [tab, setTab] = useState("resumen");
  const [modal, setModal] = useState(null);
  const oc = calcO(obra);

  const saveP = p => {
    var updObra = { ...obra, parametricos: [...(obra.parametricos || []), p].sort((a, b) => b.clase - a.clase) };
    if (p.esTecho) {
      var histTechos = obra.historialTechos || [];
      if (obra.presupuestoAutorizado && obra.presupuestoAutorizado !== p.monto) {
        histTechos = [...histTechos, { techoAnterior: obra.presupuestoAutorizado, techoNuevo: p.monto, fecha: p.fecha, clase: p.clase, id: uid() }];
      }
      updObra = { ...updObra, presupuestoAutorizado: p.monto, historialTechos: histTechos };
    }
    onUpdate(unidad.id, plaza.id, updObra);
    setModal(null);
  };
  const saveC = c => { const ex = (obra.contratos || []).find(x => x.id === c.id); const cs = ex ? obra.contratos.map(x => x.id === c.id ? c : x) : [...(obra.contratos || []), c]; onUpdate(unidad.id, plaza.id, { ...obra, contratos: cs }); setModal(null); };
  const saveCV = (cid, cv) => { const cs = obra.contratos.map(c => c.id === cid ? { ...c, convenios: [...(c.convenios || []), cv] } : c); onUpdate(unidad.id, plaza.id, { ...obra, contratos: cs }); setModal(null); };
  const saveDed = (cid, ded) => { const cs = obra.contratos.map(c => c.id === cid ? { ...c, deductivas: [...(c.deductivas || []), ded] } : c); onUpdate(unidad.id, plaza.id, { ...obra, contratos: cs }); setModal(null); };
  const saveE = (cid, e) => { const cs = obra.contratos.map(c => c.id === cid ? { ...c, estimaciones: [...(c.estimaciones || []), e] } : c); onUpdate(unidad.id, plaza.id, { ...obra, contratos: cs }); setModal(null); };
  const saveCambioAño = (cambio) => {
    const updObra = { ...obra, añoAutorizacion: cambio.añoNuevo, historialAños: [...(obra.historialAños || []), cambio] };
    onUpdate(unidad.id, plaza.id, updObra);
    setModal(null);
  };
  const añoActual = obra.añoAutorizacion || new Date().getFullYear();
  const historial = obra.historialAños || [];

  const TABS = [{ id: "resumen", l: "Resumen" }, { id: "parametricos", l: "Paramétricos" }, { id: "contratos", l: "Contratos (" + ((obra.contratos || []).length) + ")" }, { id: "flujo", l: "Flujo" }, { id: "historial", l: "Historial Año (" + (historial.length) + ")" }];

  return (
    <div className="fade-in" style={{ padding: "24px 28px" }}>
      {modal?.type === "cambioAño" && <FCambioAño obra={obra} onSave={saveCambioAño} onClose={() => setModal(null)} />}
      {modal?.type === "deductiva" && <FDeductiva contrato={modal.c} obra={obra} onSave={ded => saveDed(modal.c.id, ded)} onClose={() => setModal(null)} />}
      {modal?.type === "detalleDeductiva" && <DetalleDeductiva deductiva={modal.ded} contrato={modal.c} onClose={() => setModal(null)} />}
      {modal?.type === "detalleConvenio" && <DetalleConvenio convenio={modal.cv} contrato={modal.c} onClose={() => setModal(null)} />}
      {modal?.type === "param" && <FParam obra={obra} onSave={saveP} onClose={() => setModal(null)} />}
      {modal?.type === "contrato" && <FContrato obra={obra} onSave={saveC} onClose={() => setModal(null)} edit={modal.edit} />}
      {modal?.type === "convenio" && <FConvenio contrato={modal.c} obra={obra} onSave={cv => saveCV(modal.c.id, cv)} onClose={() => setModal(null)} />}
      {modal?.type === "estimacion" && <FEstimacion contrato={modal.c} onSave={e => saveE(modal.c.id, e)} onClose={() => setModal(null)} />}

      {/* Breadcrumb */}
      <div style={{ display: "flex", alignItems: "center", gap: 7, marginBottom: 18, fontFamily: "JetBrains Mono", fontSize: 11, color: "#6A7DA0" }}>
        <span style={{ color: unidad.color }}>{unidad.nombre}</span><span>›</span><span>{plaza.nombre}</span><span>›</span><span style={{ color: T.textPrimary }}>{obra.nombre}</span>
      </div>

      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 22 }}>
        <div>
          <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 5 }}>
            <Sem tipo={oc.sem} sz={10} />
            <h1 style={{ fontFamily: "Work Sans", fontWeight: 800, fontSize: 22, letterSpacing: "-0.01em" }}>{obra.nombre}</h1>
          </div>
          <div style={{ fontSize: 12, color: "#6A7DA0" }}>{(obra.contratos || []).length} contratos · {(obra.parametricos || []).length} estimaciones paramétricas</div>
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginTop: 6 }}>
            <span style={{ background: "rgba(11,205,211,.1)", border: "1px solid rgba(11,205,211,.25)", borderRadius: 6, padding: "3px 10px", fontFamily: "JetBrains Mono", fontSize: 12, color: "#0BCDD3", fontWeight: 600 }}>{añoActual}</span>
            {historial.length > 0 && <span style={{ fontFamily: "JetBrains Mono", fontSize: 10, color: "#7A92B5" }}>{historial.length} cambio{historial.length !== 1 ? "s" : ""} de año</span>}
            <button className="ab" onClick={() => setModal({ type: "cambioAño" })} style={{ fontSize: 11, padding: "3px 10px" }}>⟳ Cambiar año</button>
          </div>
        </div>
        {oc.varianza < 0 && (
          <div style={{ background: T.redDim, border: "1px solid " + T.red + "40", borderRadius: 8, padding: "9px 14px", display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ color: T.red }}>⚠</span>
            <div><div style={{ fontFamily: "Work Sans", fontWeight: 700, fontSize: 12, color: T.red }}>SOBRECOSTO</div><Mn color={T.red} size={12}>{fmt.currency(Math.abs(oc.varianza))}</Mn></div>
          </div>
        )}
      </div>

      {/* KPIs */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(5,1fr)", gap: 11, marginBottom: 20 }}>
        {[
          { l: "Techo Autorizado", v: fmt.currency(obra.presupuestoAutorizado) },
          { l: "Total Contratado", v: fmt.currency(oc.tc), acc: T.blue },
          { l: oc.varianza >= 0 ? "Ahorro" : "Sobrecosto", v: fmt.currency(Math.abs(oc.varianza)), acc: oc.varianza >= 0 ? T.green : T.red },
          { l: "Total Pagado", v: fmt.currency(oc.tp), acc: T.yellow },
          { l: "% Techo Usado", v: fmt.pct(oc.pct), acc: oc.pct > 100 ? T.red : oc.pct > 90 ? T.yellow : T.green },
        ].map((k, i) => (
          <div key={i} className="card" style={{ padding: "14px 15px" }}>
            <div style={{ fontFamily: "JetBrains Mono", fontSize: 9, color: "#6A7DA0", letterSpacing: "0.07em", textTransform: "uppercase", marginBottom: 8 }}>{k.l}</div>
            <div style={{ fontFamily: "Work Sans", fontWeight: 700, fontSize: 16, color: k.acc || T.textPrimary }}>{k.v}</div>
          </div>
        ))}
      </div>

      <div className="card" style={{ padding: "13px 18px", marginBottom: 22 }}>
        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
          <span style={{ fontSize: 12, color: "#6A7DA0" }}>Uso del presupuesto autorizado</span>
          <Mn color={oc.pct > 100 ? T.red : T.green}>{fmt.pct(oc.pct)}</Mn>
        </div>
        <PBar pct={oc.pct} />
      </div>

      {/* Tabs */}
      <div style={{ display: "flex", gap: 4, borderBottom: "1px solid " + T.border, marginBottom: 22 }}>
        {TABS.map(t => <button key={t.id} className={"tb " + (tab === t.id ? "on" : "")} onClick={() => setTab(t.id)}>{t.l}</button>)}
      </div>

      {/* RESUMEN */}
      {tab === "resumen" && (
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
          <div className="card" style={{ padding: 18 }}>
            <div style={{ fontFamily: "Work Sans", fontWeight: 600, fontSize: 13, marginBottom: 14 }}>Contratos</div>
            {(obra.contratos || []).length === 0 && <div style={{ color: "#6A7DA0", fontSize: 13 }}>Sin contratos registrados.</div>}
            {(obra.contratos || []).map(c => {
              const cv = calcC(c);
              return (
                <div key={c.id} style={{ padding: "11px 0", borderBottom: "1px solid " + T.border }}>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
                    <div><div style={{ fontSize: 13, fontWeight: 500, marginBottom: 4 }}>{c.contratista}</div><CtTag v={c.clasificacion} /></div>
                    <Mn color={T.blue} size={13}>{fmt.currency(cv.ma)}</Mn>
                  </div>
                  <PBar pct={(cv.tb / cv.ma) * 100} color={T.blue} />
                </div>
              );
            })}
          </div>

          {/* Comparativo Paramétrico vs Contratado */}
          {oc.comparativo && (
            <div className="card" style={{ padding: 18, marginBottom: 14 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
                <div style={{ fontFamily: "Work Sans", fontWeight: 600, fontSize: 13 }}>Comparativo Paramétrico vs Contratado</div>
                <div style={{ display: "flex", gap: 10 }}>
                  {oc.comparativo.totalAhorro > 0 && <Tag label={"Ahorro: " + fmt.currency(oc.comparativo.totalAhorro)} color="#00A86B" />}
                  {oc.comparativo.totalPendiente > 0 && <Tag label={"Pendiente: " + fmt.currency(oc.comparativo.totalPendiente)} color="#F0B429" />}
                  {oc.comparativo.totalExtras > 0 && <Tag label={"Extras: " + fmt.currency(oc.comparativo.totalExtras)} color="#E8344A" />}
                </div>
              </div>
              <div style={{ overflowX: "auto" }}>
                <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
                  <thead>
                    <tr style={{ background: "#0D0C22" }}>
                      {["Partida","Tipo","Paramétrico","Contratado","Varianza","Estado"].map(h => (
                        <th key={h} style={{ padding: "9px 12px", textAlign: "left", fontFamily: "JetBrains Mono", fontSize: 9, color: "#6A8AB5", letterSpacing: "0.06em", textTransform: "uppercase", fontWeight: 500 }}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {oc.comparativo.partidas.map(p => {
                      var statusColor = { "ahorro": "#00A86B", "sobrecosto": "#E8344A", "pendiente": "#F0B429", "no-ejecutable": "#6A8AB5", "igual": "#0BCDD3" };
                      var statusLabel = { "ahorro": "Ahorro", "sobrecosto": "Sobrecosto", "pendiente": "Pendiente", "no-ejecutable": "No Ejecutable", "igual": "Exacto" };
                      return (
                        <tr key={p.id} style={{ borderTop: "1px solid #1E1E50", opacity: p.noEjecutable ? 0.6 : 1 }}>
                          <td style={{ padding: "10px 12px", fontWeight: 500, textDecoration: p.noEjecutable ? "line-through" : "none" }}>{p.nombre}</td>
                          <td style={{ padding: "10px 12px" }}><span style={{ fontFamily: "JetBrains Mono", fontSize: 9, fontWeight: 700, padding: "2px 6px", borderRadius: 3, background: p.tipo === "HC" ? "rgba(43,111,212,.15)" : "rgba(240,180,41,.15)", color: p.tipo === "HC" ? "#2B6FD4" : "#F0B429" }}>{p.tipo}</span></td>
                          <td style={{ padding: "10px 12px", fontFamily: "JetBrains Mono", fontSize: 12, color: "#A0B8D8" }}>{fmt.currency(p.paramTotal)}</td>
                          <td style={{ padding: "10px 12px", fontFamily: "JetBrains Mono", fontSize: 12, color: "#0BCDD3" }}>{p.contTotal > 0 ? fmt.currency(p.contTotal) : "—"}</td>
                          <td style={{ padding: "10px 12px", fontFamily: "JetBrains Mono", fontSize: 12, color: statusColor[p.status] || "#6A8AB5" }}>{p.status !== "pendiente" && p.status !== "no-ejecutable" ? (p.varianza > 0 ? "+" : "") + fmt.currency(p.varianza) : "—"}</td>
                          <td style={{ padding: "10px 12px" }}><Tag label={statusLabel[p.status] || p.status} color={statusColor[p.status] || "#6A8AB5"} /></td>
                        </tr>
                      );
                    })}
                    {oc.comparativo.extras.map((e, i) => (
                      <tr key={"ext"+i} style={{ borderTop: "1px solid #1E1E50", background: "rgba(232,52,74,.04)" }}>
                        <td style={{ padding: "10px 12px", color: "#E8344A" }}>{e.nombre}</td>
                        <td style={{ padding: "10px 12px" }}>{e.tipo && <span style={{ fontFamily: "JetBrains Mono", fontSize: 9, fontWeight: 700, padding: "2px 6px", borderRadius: 3, background: e.tipo === "HC" ? "rgba(43,111,212,.15)" : "rgba(240,180,41,.15)", color: e.tipo === "HC" ? "#2B6FD4" : "#F0B429" }}>{e.tipo}</span>}</td>
                        <td style={{ padding: "10px 12px", fontFamily: "JetBrains Mono", fontSize: 11, color: "#6A8AB5" }}>Sin paramétrico</td>
                        <td style={{ padding: "10px 12px", fontFamily: "JetBrains Mono", fontSize: 12, color: "#E8344A" }}>{fmt.currency(e.monto)}</td>
                        <td style={{ padding: "10px 12px", fontFamily: "JetBrains Mono", fontSize: 12, color: "#E8344A" }}>-{fmt.currency(e.monto)}</td>
                        <td style={{ padding: "10px 12px" }}><Tag label="Extra presupuestal" color="#E8344A" /></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {/* HC/SC summary (legacy) */}
          {(oc.paramHC > 0 || oc.paramSC > 0 || oc.tcHC > 0 || oc.tcSC > 0) && !oc.comparativo && (
            <div className="card" style={{ padding: 18, marginBottom: 14 }}>
              <div style={{ fontFamily: "Work Sans", fontWeight: 600, fontSize: 13, marginBottom: 14 }}>HC vs SC — Paramétrico vs Contratado</div>
              <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
                <thead>
                  <tr style={{ background: "#0D0C22" }}>
                    {["Tipo","Paramétrico","Contratado","Varianza","Estado"].map(h => (
                      <th key={h} style={{ padding: "9px 14px", textAlign: "left", fontFamily: "JetBrains Mono", fontSize: 9, color: "#6A8AB5", letterSpacing: "0.06em", textTransform: "uppercase", fontWeight: 500 }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {[
                    { label: "Hard Cost (HC)", color: "#2B6FD4", param: oc.paramHC, cont: oc.tcHC, sob: oc.sobrecostoHC },
                    { label: "Soft Cost (SC)", color: "#F0B429", param: oc.paramSC, cont: oc.tcSC, sob: oc.sobrecostoSC },
                    { label: "TOTAL", color: "#0BCDD3", param: oc.paramTotal, cont: oc.tc, sob: oc.varianza < 0 },
                  ].map((row, i) => (
                    <tr key={i} style={{ borderTop: "1px solid #1E1E50", background: i === 2 ? "#0D0C22" : "transparent" }}>
                      <td style={{ padding: "10px 14px", fontFamily: "Work Sans", fontWeight: i === 2 ? 700 : 500, color: row.color }}>{row.label}</td>
                      <td style={{ padding: "10px 14px", fontFamily: "JetBrains Mono", fontSize: 12, color: "#A0B8D8" }}>{row.param > 0 ? fmt.currency(row.param) : "—"}</td>
                      <td style={{ padding: "10px 14px", fontFamily: "JetBrains Mono", fontSize: 12, color: row.color }}>{row.cont > 0 ? fmt.currency(row.cont) : "—"}</td>
                      <td style={{ padding: "10px 14px", fontFamily: "JetBrains Mono", fontSize: 12, color: row.sob ? "#E8344A" : "#00A86B" }}>{row.param > 0 ? fmt.currency(row.param - row.cont) : "—"}</td>
                      <td style={{ padding: "10px 14px" }}>{row.param > 0 ? <Tag label={row.sob ? "Sobrecosto" : "En Control"} color={row.sob ? "#E8344A" : "#00A86B"} /> : <span style={{ color: "#6A8AB5", fontSize: 12 }}>Sin paramétrico</span>}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
          {/* Historial de Techo */}
          {oc.historialTechos && oc.historialTechos.length > 0 && (
            <div className="card" style={{ padding: 18, marginBottom: 14, border: "1px solid rgba(240,180,41,.2)", background: "rgba(240,180,41,.04)" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 14 }}>
                <span style={{ fontSize: 16 }}>⚡</span>
                <div style={{ fontFamily: "Work Sans", fontWeight: 700, fontSize: 13, color: "#F0B429" }}>Historial de Actualizaciones de Techo</div>
              </div>
              {oc.historialTechos.map((h, i) => (
                <div key={h.id || i} style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 0", borderBottom: i < oc.historialTechos.length - 1 ? "1px solid rgba(240,180,41,.15)" : "none" }}>
                  <Mn color="#6A8AB5" size={11}>{fmt.date(h.fecha)}</Mn>
                  <Tag label={"Clase " + h.clase} color="#6A8AB5" />
                  <Mn color="#F0B429" size={13}>{fmt.currency(h.techoAnterior)}</Mn>
                  <span style={{ color: "#6A8AB5", fontSize: 14 }}>→</span>
                  <Mn color="#0BCDD3" size={13}>{fmt.currency(h.techoNuevo)}</Mn>
                  <Mn color={h.techoNuevo > h.techoAnterior ? "#E8344A" : "#00A86B"} size={11}>({h.techoNuevo > h.techoAnterior ? "+" : ""}{fmt.currency(h.techoNuevo - h.techoAnterior)})</Mn>
                </div>
              ))}
            </div>
          )}
          <div className="card" style={{ padding: 18 }}>
            <div style={{ fontFamily: "Work Sans", fontWeight: 600, fontSize: 13, marginBottom: 14 }}>Costos Adicionales</div>
            {Object.entries(oc.cl).filter(([, v]) => v > 0).length === 0 ? (
              <div style={{ color: "#6A7DA0", fontSize: 13 }}>Sin costos adicionales clasificados.</div>
            ) : Object.entries(oc.cl).filter(([, v]) => v > 0).map(([k, v]) => {
              const tot = Object.values(oc.cl).reduce((s, x) => s + x, 0);
              const colors = { modificacion: T.blue, omision: T.yellow, situacion_fisica: T.orange, mala_ejecucion: T.red };
              return (
                <div key={k} style={{ padding: "9px 0", borderBottom: "1px solid " + T.border }}>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}><CtTag v={k} /><Mn size={12}>{fmt.currency(v)}</Mn></div>
                  <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                    <div style={{ flex: 1 }}><PBar pct={(v / tot) * 100} color={colors[k]} /></div>
                    <Mn color={T.textMuted} size={10}>{fmt.pct((v / tot) * 100)}</Mn>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* PARAMÉTRICOS */}
      {tab === "parametricos" && (
        <div>
          <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: 14 }}>
            <button className="bp" onClick={() => setModal({ type: "param" })}>+ Nueva Estimación Paramétrica</button>
          </div>
          <div className="card" style={{ overflow: "hidden" }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
              <thead>
                <tr style={{ background: T.surfaceAlt }}>
                  {["Clase", "Monto", "Var. vs Techo", "Fecha", "Supuestos"].map(h => (
                    <th key={h} style={{ padding: "10px 16px", textAlign: "left", fontFamily: "JetBrains Mono", fontSize: 9, color: "#6A7DA0", letterSpacing: "0.08em", textTransform: "uppercase", fontWeight: 500 }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {(obra.parametricos || []).map((p, i) => {
                  const v = ((p.monto - obra.presupuestoAutorizado) / obra.presupuestoAutorizado) * 100;
                  const claseColor = [T.textMuted, T.green, T.yellow, T.blue, T.silver, T.textMuted][6 - p.clase] || T.textMuted;
                  return (
                    <tr key={i} style={{ borderTop: "1px solid " + T.border }}>
                      <td style={{ padding: "11px 16px" }}><Tag label={"CLASE " + (p.clase)} color={claseColor} /></td>
                      <td style={{ padding: "11px 16px" }}><Mn size={13}>{fmt.currency(p.monto)}</Mn></td>
                      <td style={{ padding: "11px 16px" }}><Mn color={v > 0 ? T.red : T.green} size={12}>{v > 0 ? "+" : ""}{fmt.pct(v)}</Mn></td>
                      <td style={{ padding: "11px 16px" }}><Mn color={T.textMuted} size={11}>{fmt.date(p.fecha)}</Mn></td>
                      <td style={{ padding: "11px 16px", fontSize: 12, color: T.textSecondary }}>{p.supuestos}</td>
                    </tr>
                  );
                })}
                <tr style={{ borderTop: "2px solid " + T.border, background: T.surfaceAlt }}>
                  <td colSpan={2} style={{ padding: "11px 16px", fontFamily: "Work Sans", fontWeight: 700, fontSize: 12, color: T.green }}>TECHO AUTORIZADO — {fmt.currency(obra.presupuestoAutorizado)}</td>
                  <td colSpan={3} />
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      )}

      {/* CONTRATOS */}
      {tab === "contratos" && (
        <div>
          <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: 14 }}>
            <button className="bp" onClick={() => setModal({ type: "contrato" })}>+ Nuevo Contrato</button>
          </div>
          {(obra.contratos || []).length === 0 && (
            <div style={{ textAlign: "center", padding: "40px", color: "#6A7DA0", fontSize: 14, border: "1px dashed " + T.border, borderRadius: 11 }}>Sin contratos. Agrega el primer contrato.</div>
          )}
          {(obra.contratos || []).map(c => {
            const cv = calcC(c);
            return (
              <div key={c.id} className="card" style={{ marginBottom: 12, padding: 18 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 14 }}>
                  <div>
                    <div style={{ display: "flex", alignItems: "center", gap: 9, marginBottom: 5 }}>
                      <div style={{ fontFamily: "Work Sans", fontWeight: 700, fontSize: 14 }}>{c.contratista}</div>
                      <CtTag v={c.clasificacion} />
                    </div>
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      <Mn color={T.textMuted} size={11}>{c.numero} · {fmt.date(c.fechaFirma)}</Mn>
                      {c.tipoContrato && <span style={{ fontFamily: "JetBrains Mono", fontSize: 9, fontWeight: 700, padding: "2px 7px", borderRadius: 4, background: c.tipoContrato === "HC" ? "rgba(43,111,212,.15)" : "rgba(240,180,41,.15)", color: c.tipoContrato === "HC" ? "#2B6FD4" : "#F0B429", border: "1px solid " + (c.tipoContrato === "HC" ? "rgba(43,111,212,.3)" : "rgba(240,180,41,.3)") }}>{c.tipoContrato}</span>}
                    </div>
                  </div>
                  <div style={{ textAlign: "right" }}>
                    <div style={{ fontFamily: "Work Sans", fontWeight: 700, fontSize: 18, color: T.blue }}>{fmt.currency(cv.ma)}</div>
                    {cv.cvTotal !== 0 && <Mn color={cv.cvTotal > 0 ? T.red : T.green} size={11}>{cv.cvTotal > 0 ? "+" : ""}{fmt.currency(cv.cvTotal)} convenios</Mn>}
                  {cv.dedT < 0 && <Mn color="#00A86B" size={11}>{fmt.currency(cv.dedT)} deductivas</Mn>}
                  </div>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 10, marginBottom: 12 }}>
                  {[{ l: "Monto Vigente", v: fmt.currency(cv.ma) }, { l: "Anticipo " + (c.anticipoPct) + "%", v: fmt.currency(cv.ant), acc: T.green }, { l: "Estimado", v: fmt.currency(cv.tb), acc: T.blue }, { l: "Neto Pagado", v: fmt.currency(cv.neto), acc: T.yellow }].map((k, i) => (
                    <div key={i}><div style={{ fontFamily: "JetBrains Mono", fontSize: 9, color: "#6A7DA0", marginBottom: 4, textTransform: "uppercase" }}>{k.l}</div><Mn color={k.acc} size={13}>{k.v}</Mn></div>
                  ))}
                  {cv.dedT < 0 && <div style={{ gridColumn: "span 2" }}><div style={{ fontFamily: "JetBrains Mono", fontSize: 9, color: "#6A7DA0", marginBottom: 4, textTransform: "uppercase" }}>Deductivas ({(c.deductivas || []).length})</div><Mn color="#00A86B" size={13}>{fmt.currency(cv.dedT)}</Mn></div>}
                </div>
                <PBar pct={cv.ma > 0 ? (cv.tb / cv.ma) * 100 : 0} />
                <div style={{ display: "flex", gap: 8, marginTop: 14, flexWrap: "wrap" }}>
                  <button className="ab" onClick={() => setModal({ type: "contrato", edit: c })}>✎ Editar</button>
                  <button className="ab" onClick={() => setModal({ type: "convenio", c })}>+ Convenio ({(c.convenios || []).length})</button>
                  <button className="ab" onClick={() => setModal({ type: "estimacion", c })}>+ Estimación ({(c.estimaciones || []).length})</button>
                  {(c.convenios || []).map(cv => (
                    <button key={cv.id} className="ab" onClick={() => setModal({ type: "detalleConvenio", cv, c })}
                      style={{ borderColor: "rgba(11,205,211,.35)", color: "#0BCDD3" }}>
                      📋 Conv. #{cv.numero}
                    </button>
                  ))}
                  <button className="ab" onClick={() => setModal({ type: "deductiva", c })}
                    style={{ borderColor: "rgba(0,168,107,.35)", color: "#00A86B" }}>
                    ➖ Nueva Deductiva ({(c.deductivas || []).length})
                  </button>
                  {(c.deductivas || []).map(ded => (
                    <button key={ded.id} className="ab" onClick={() => setModal({ type: "detalleDeductiva", ded, c })}
                      style={{ borderColor: "rgba(0,168,107,.35)", color: "#00A86B" }}>
                      📉 Ded. #{ded.numero}
                    </button>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* FLUJO */}
      {tab === "flujo" && (() => {
        const pagos = [];
        (obra.contratos || []).forEach(c => (c.estimaciones || []).forEach(e => {
          const b = fmt.num(e.subtotal), am = b * fmt.num(e.amortizacionAnticipo) / 100, r = b * fmt.num(e.retencion) / 100;
          pagos.push({ fecha: e.fecha, desc: "Est. #" + (e.numero), neto: b - am - r, status: e.status, contratista: c.contratista, b, am, r });
        }));
        pagos.sort((a, b) => a.fecha.localeCompare(b.fecha));
        const totPag = pagos.filter(p => p.status === "pagada").reduce((s, p) => s + p.neto, 0);
        const totPend = pagos.filter(p => p.status !== "pagada").reduce((s, p) => s + p.neto, 0);
        return (
          <div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 16 }}>
              <div className="card" style={{ padding: 16 }}><KPI label="Total Pagado" value={fmt.currency(totPag)} accent={T.green} /></div>
              <div className="card" style={{ padding: 16 }}><KPI label="Por Pagar" value={fmt.currency(totPend)} accent={T.yellow} /></div>
            </div>
            <div className="card" style={{ overflow: "hidden" }}>
              <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
                <thead><tr style={{ background: T.surfaceAlt }}>{["Fecha", "Estimación", "Contratista", "Subtotal", "Amort.", "Retención", "Neto", "Status"].map(h => <th key={h} style={{ padding: "10px 12px", textAlign: "left", fontFamily: "JetBrains Mono", fontSize: 9, color: "#6A7DA0", letterSpacing: "0.06em", textTransform: "uppercase", fontWeight: 500 }}>{h}</th>)}</tr></thead>
                <tbody>
                  {pagos.map((p, i) => (
                    <tr key={i} className="rh" style={{ borderTop: "1px solid " + T.border }}>
                      <td style={{ padding: "10px 12px" }}><Mn color={T.textMuted} size={11}>{fmt.date(p.fecha)}</Mn></td>
                      <td style={{ padding: "10px 12px", fontSize: 13 }}>{p.desc}</td>
                      <td style={{ padding: "10px 12px", fontSize: 12, color: T.textSecondary }}>{p.contratista.split(" ")[0]}</td>
                      <td style={{ padding: "10px 12px" }}><Mn size={12}>{fmt.currency(p.b)}</Mn></td>
                      <td style={{ padding: "10px 12px" }}><Mn color={T.yellow} size={12}>{fmt.currency(p.am)}</Mn></td>
                      <td style={{ padding: "10px 12px" }}><Mn color={T.orange} size={12}>{fmt.currency(p.r)}</Mn></td>
                      <td style={{ padding: "10px 12px" }}><Mn color={T.green} size={12}>{fmt.currency(p.neto)}</Mn></td>
                      <td style={{ padding: "10px 12px" }}><StTag s={p.status} /></td>
                    </tr>
                  ))}
                  {pagos.length === 0 && <tr><td colSpan={8} style={{ padding: "20px", color: "#6A7DA0", fontSize: 13, textAlign: "center" }}>Sin estimaciones registradas.</td></tr>}
                </tbody>
              </table>
            </div>
          </div>
        );
      })()}
      {tab === "historial" && (
        <div>
          {historial.length === 0 ? (
            <div style={{ textAlign: "center", padding: "40px", color: "#7A92B5", fontSize: 13, border: "1px dashed #1E1E50", borderRadius: 11 }}>
              Sin cambios de año. El año de autorización actual es <strong style={{ color: "#0BCDD3" }}>{añoActual}</strong>.
            </div>
          ) : (
            <div>
              <div style={{ marginBottom: 20 }}>
                <div style={{ fontFamily: "Work Sans", fontWeight: 700, fontSize: 13, marginBottom: 12 }}>Línea de Tiempo de Cambios</div>
                <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                  {[...historial].sort((a, b) => a.fecha.localeCompare(b.fecha)).map((h, i) => (
                    <React.Fragment key={h.id}>
                      {i === 0 && <div style={{ background: "#1E1E50", borderRadius: 20, padding: "6px 14px", fontFamily: "JetBrains Mono", fontSize: 12, color: "#7A92B5" }}>{h.añoAnterior}</div>}
                      <span style={{ color: "#F0B429" }}>→</span>
                      <div style={{ background: "rgba(11,205,211,.1)", border: "1px solid rgba(11,205,211,.3)", borderRadius: 20, padding: "6px 14px", fontFamily: "JetBrains Mono", fontSize: 12, color: "#0BCDD3", fontWeight: 600 }}>{h.añoNuevo}</div>
                    </React.Fragment>
                  ))}
                </div>
              </div>
              <div style={{ fontFamily: "Work Sans", fontWeight: 700, fontSize: 13, marginBottom: 12 }}>Registro de Cambios</div>
              {[...historial].sort((a, b) => b.fecha.localeCompare(a.fecha)).map(h => (
                <div key={h.id} style={{ background: "#0D0C22", border: "1px solid #1E1E50", borderRadius: 10, padding: 18, marginBottom: 10 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                      <span style={{ background: "#1E1E50", borderRadius: 6, padding: "4px 10px", fontFamily: "JetBrains Mono", fontSize: 13, color: "#7A92B5" }}>{h.añoAnterior}</span>
                      <span style={{ color: "#F0B429", fontSize: 18 }}>→</span>
                      <span style={{ background: "rgba(11,205,211,.1)", border: "1px solid rgba(11,205,211,.25)", borderRadius: 6, padding: "4px 10px", fontFamily: "JetBrains Mono", fontSize: 13, color: "#0BCDD3", fontWeight: 700 }}>{h.añoNuevo}</span>
                    </div>
                    <span style={{ fontFamily: "JetBrains Mono", fontSize: 11, color: "#7A92B5" }}>{fmt.date(h.fecha)}</span>
                  </div>
                  <div style={{ fontSize: 13, color: "#8A9DC0", lineHeight: 1.6, borderLeft: "3px solid rgba(240,180,41,.4)", paddingLeft: 12 }}>{h.motivo}</div>
                </div>
              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

      <div style={{ color: "#6A7DA0", fontSize: 13, marginBottom: 24 }}>{unidad.plazas.length} plazas · {unidad.plazas.reduce((s, p) => s + p.obras.length, 0)} obras</div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 14, marginBottom: 24 }}>
        {[{ l: "Autorizado", v: fmt.currency(c.aut) }, { l: "Contratado", v: fmt.currency(c.cont), acc: unidad.color }, { l: "Varianza", v: fmt.currency(c.aut - c.cont), acc: c.cont > c.aut ? T.red : T.green }].map((k, i) => (
          <div key={i} className="card" style={{ padding: 18 }}><KPI label={k.l} value={k.v} accent={k.acc} /></div>

              <div style={{ fontFamily: "Work Sans", fontWeight: 700, fontSize: 14 }}>{p.nombre}</div>
              <Mn color={T.textMuted} size={11}>{p.obras.length} obras · {fmt.currency(pc.aut)}</Mn>
            </div>

              {p.obras.map(o => {
                const oc = calcO(o);
                return (
                  <div key={o.id} className="card ch" onClick={() => setView({ type: "obra", unidadId: unidad.id, plazaId: p.id, obraId: o.id })} style={{ padding: 16, cursor: "pointer" }}>
                    <div style={{ display: "flex", gap: 8, alignItems: "flex-start", marginBottom: 10 }}><Sem tipo={oc.sem} /><span style={{ fontSize: 13, fontWeight: 500 }}>{o.nombre}</span></div>
                    <Mn color={unidad.color} size={15}>{fmt.currency(oc.tc)}</Mn>
                    <div style={{ margin: "8px 0" }}><PBar pct={oc.pct} color={unidad.color} /></div>

                      <Mn color={oc.varianza >= 0 ? T.green : T.red} size={11}>{fmt.currency(Math.abs(oc.varianza))}</Mn>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ── PORTAFOLIO VIEW ─────────────────────────────────────────────
function Portafolio({ data, setView }) {
  const añosDisponibles = [...new Set(
    data.unidades.flatMap(u => u.plazas.flatMap(p => p.obras.map(o => o.añoAutorizacion || new Date().getFullYear())))
  )].sort();
  const [filtroAño, setFiltroAño] = useState("todos");
  const totalObras = data.unidades.reduce((s, u) => s + u.plazas.reduce((s2, p) => s2 + p.obras.length, 0), 0);

  function obraVisible(o) {
    if (filtroAño === "todos") return true;
    return (o.añoAutorizacion || new Date().getFullYear()) === parseInt(filtroAño);
  }

  const obrasFilt = data.unidades.flatMap(u => u.plazas.flatMap(p => p.obras.filter(obraVisible).map(o => ({ o, u, p }))));
  const tots = obrasFilt.reduce((a, { o }) => {
    const oc = calcO(o);
    return { aut: a.aut + fmt.num(o.presupuestoAutorizado), cont: a.cont + oc.tc, pag: a.pag + oc.tp };
  }, { aut: 0, cont: 0, pag: 0 });
  const conCambio = obrasFilt.filter(({ o }) => (o.historialAños || []).length > 0).length;

  return (
    <div className="fade-in" style={{ padding: "24px 28px" }}>

      {/* Header con filtro */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 24 }}>
        <div>
          <div style={{ fontFamily: "Work Sans", fontWeight: 800, fontSize: 24, letterSpacing: "-0.01em", marginBottom: 3 }}>Portafolio</div>
          <div style={{ color: "#A0B8D8", fontSize: 13 }}>{obrasFilt.length} obra{obrasFilt.length !== 1 ? "s" : ""}{filtroAño !== "todos" ? " · Año " + filtroAño : " de " + totalObras + " total"}</div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <span style={{ fontFamily: "JetBrains Mono", fontSize: 10, color: "#7A92B5", letterSpacing: "0.08em", textTransform: "uppercase" }}>Año:</span>
          <select value={filtroAño} onChange={e => setFiltroAño(e.target.value)}
            style={{ fontFamily: "JetBrains Mono", fontSize: 12, fontWeight: 600, padding: "8px 16px", borderRadius: 7, border: "1px solid #1E1E50", background: "#080818", color: "#0BCDD3", cursor: "pointer", outline: "none", minWidth: 140 }}>
            <option value="todos">Todos los años</option>
            {añosDisponibles.map(a => <option key={a} value={String(a)}>{a}</option>)}
          </select>
        </div>
      </div>

      {/* Resumen del filtro activo */}
      {filtroAño !== "todos" && (
        <div style={{ background: "rgba(11,205,211,.06)", border: "1px solid rgba(11,205,211,.2)", borderRadius: 12, padding: "16px 20px", marginBottom: 24, display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 16 }}>
          <div><div style={{ fontFamily: "JetBrains Mono", fontSize: 9, color: "#7A92B5", textTransform: "uppercase", marginBottom: 6 }}>Obras {filtroAño}</div><div style={{ fontFamily: "Work Sans", fontWeight: 700, fontSize: 18, color: "#0BCDD3" }}>{obrasFilt.length}</div></div>
          <div><div style={{ fontFamily: "JetBrains Mono", fontSize: 9, color: "#7A92B5", textTransform: "uppercase", marginBottom: 6 }}>Techo Autorizado</div><div style={{ fontFamily: "Work Sans", fontWeight: 700, fontSize: 15 }}>{fmt.currency(tots.aut)}</div></div>
          <div><div style={{ fontFamily: "JetBrains Mono", fontSize: 9, color: "#7A92B5", textTransform: "uppercase", marginBottom: 6 }}>Total Pagado</div><div style={{ fontFamily: "Work Sans", fontWeight: 700, fontSize: 15, color: "#F0B429" }}>{fmt.currency(tots.pag)}</div></div>
          <div><div style={{ fontFamily: "JetBrains Mono", fontSize: 9, color: "#7A92B5", textTransform: "uppercase", marginBottom: 6 }}>Obras Pateadas</div><div style={{ fontFamily: "Work Sans", fontWeight: 700, fontSize: 18, color: conCambio > 0 ? "#F0B429" : "#00A86B" }}>{conCambio}</div></div>
        </div>
      )}

      {/* Unidades */}
      {data.unidades.map(u => {
        const obrasU = u.plazas.flatMap(p => p.obras.filter(obraVisible));
        if (obrasU.length === 0 && filtroAño !== "todos") return null;
        const uc = calcU(u);
        const pct = uc.aut > 0 ? (uc.cont / uc.aut) * 100 : 0;
        return (
          <div key={u.id} style={{ marginBottom: 32 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 16, paddingBottom: 12, borderBottom: "2px solid " + u.color + "40" }}>
              <div style={{ width: 4, height: 32, background: u.color, borderRadius: 2 }} />
              <div style={{ flex: 1 }}>
                <div style={{ fontFamily: "Work Sans", fontWeight: 800, fontSize: 18, color: u.color }}>{u.nombre.toUpperCase()}</div>
                <div style={{ fontSize: 12, color: "#A0B8D8", marginTop: 2 }}>{u.plazas.length} plazas · {u.plazas.reduce((s, p) => s + p.obras.length, 0)} obras totales</div>
              </div>
              {filtroAño === "todos" && (
                <div style={{ textAlign: "right" }}>
                  <div style={{ fontFamily: "JetBrains Mono", fontSize: 18, fontWeight: 700, color: pct > 100 ? "#E8344A" : pct > 90 ? "#F0B429" : u.color }}>{fmt.pct(pct)}</div>
                  <div style={{ fontSize: 11, color: "#7A92B5" }}>del techo</div>
                </div>
              )}
            </div>

            {u.plazas.map(p => {
              const obrasPF = p.obras.filter(obraVisible);
              if (obrasPF.length === 0 && filtroAño !== "todos") return null;
              return (
                <div key={p.id} style={{ marginBottom: 20 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
                    <span style={{ fontFamily: "Work Sans", fontWeight: 700, fontSize: 14 }}>{p.nombre}</span>
                    <span style={{ fontFamily: "JetBrains Mono", fontSize: 10, color: "#7A92B5" }}>{obrasPF.length}/{p.obras.length} obras</span>
                    <div style={{ flex: 1, height: 1, background: "#1E1E50", marginLeft: 8 }} />
                  </div>
                  {obrasPF.length === 0 && (
                    <div style={{ padding: "14px 18px", color: "#7A92B5", fontSize: 12, border: "1px dashed #1E1E50", borderRadius: 8 }}>Sin obras para {filtroAño}.</div>
                  )}
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(290px,1fr))", gap: 12 }}>
                    {obrasPF.map(o => {
                      const oc = calcO(o);
                      const hist = o.historialAños || [];
                      return (
                        <div key={o.id} className="card ch" onClick={() => setView({ type: "obra", unidadId: u.id, plazaId: p.id, obraId: o.id })}
                          style={{ padding: 16, cursor: "pointer", borderLeft: "3px solid " + (oc.sem === "green" ? u.color : oc.sem === "yellow" ? "#F0B429" : "#E8344A") }}>
                          <div style={{ marginBottom: 10 }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 7, marginBottom: 6 }}>
                              <Sem tipo={oc.sem} sz={7} />
                              <span style={{ fontFamily: "Work Sans", fontWeight: 700, fontSize: 13 }}>{o.nombre}</span>
                            </div>
                            <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                              <span style={{ background: "rgba(11,205,211,.1)", border: "1px solid rgba(11,205,211,.2)", borderRadius: 4, padding: "2px 8px", fontFamily: "JetBrains Mono", fontSize: 10, color: "#0BCDD3" }}>{o.añoAutorizacion || new Date().getFullYear()}</span>
                              {hist.length > 0 && <span style={{ background: "rgba(240,180,41,.1)", border: "1px solid rgba(240,180,41,.25)", borderRadius: 4, padding: "2px 8px", fontFamily: "JetBrains Mono", fontSize: 10, color: "#F0B429" }}>⟳ {hist.length}x pateada</span>}
                            </div>
                          </div>
                          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 10 }}>
                            <div style={{ background: "#080818", borderRadius: 6, padding: "7px 10px" }}>
                              <div style={{ fontFamily: "JetBrains Mono", fontSize: 8, color: "#7A92B5", textTransform: "uppercase", marginBottom: 3 }}>Techo</div>
                              <div style={{ fontFamily: "Work Sans", fontWeight: 700, fontSize: 12 }}>{fmt.currency(o.presupuestoAutorizado)}</div>
                            </div>
                            <div style={{ background: "#080818", borderRadius: 6, padding: "7px 10px" }}>
                              <div style={{ fontFamily: "JetBrains Mono", fontSize: 8, color: "#7A92B5", textTransform: "uppercase", marginBottom: 3 }}>Contratado</div>
                              <div style={{ fontFamily: "Work Sans", fontWeight: 700, fontSize: 12, color: u.color }}>{fmt.currency(oc.tc)}</div>
                            </div>
                          </div>
                          <PBar pct={oc.pct} color={u.color} />
                          <div style={{ display: "flex", justifyContent: "space-between", marginTop: 6 }}>
                            <span style={{ fontFamily: "JetBrains Mono", fontSize: 10, color: "#7A92B5" }}>{fmt.pct(oc.pct)} techo</span>
                            <span style={{ fontFamily: "JetBrains Mono", fontSize: 10, color: oc.varianza >= 0 ? "#00A86B" : "#E8344A" }}>{oc.varianza >= 0 ? "▼" : "▲"} {fmt.currency(Math.abs(oc.varianza))}</span>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>
        );
      })}
    </div>
  );
}


function App() {
  const [data, setData] = useState(SEED);
  const [view, setView] = useState({ type: "dashboard" });
  const [modal, setModal] = useState(null);

  function updateObra(uId, pId, updOb) {
    setData(d => ({ ...d, unidades: d.unidades.map(u => u.id !== uId ? u : { ...u, plazas: u.plazas.map(p => p.id !== pId ? p : { ...p, obras: p.obras.map(o => o.id !== updOb.id ? o : updOb) }) }) }));
  }
  function addObra(obra) {
    setData(d => ({ ...d, unidades: d.unidades.map(u => u.id !== obra.unidadId ? u : { ...u, plazas: u.plazas.map(p => p.id !== obra.plazaId ? p : { ...p, obras: [...p.obras, obra] }) }) }));
    setModal(null);
    setView({ type: "obra", unidadId: obra.unidadId, plazaId: obra.plazaId, obraId: obra.id });
  }
  function addPlaza(plaza) {
    setData(d => ({ ...d, unidades: d.unidades.map(u => u.id !== plaza.unidadId ? u : { ...u, plazas: [...u.plazas, plaza] }) }));
    setModal(null);
  }

  function renderMain() {
    if (view.type === "dashboard") return <Dashboard data={data} />;
    if (view.type === "portafolio") return <Portafolio data={data} setView={setView} />;
    if (view.type === "unidad") { const u = data.unidades.find(u => u.id === view.id); return u ? <VistaUnidad unidad={u} setView={setView} /> : null; }
    if (view.type === "plaza") { const u = data.unidades.find(u => u.id === view.unidadId); return u ? <VistaUnidad unidad={u} setView={setView} /> : null; }
    if (view.type === "obra") {
      const u = data.unidades.find(u => u.id === view.unidadId);
      const p = u?.plazas.find(p => p.id === view.plazaId);
      const o = p?.obras.find(o => o.id === view.obraId);
      if (!u || !p || !o) return null;
      return <VistaObra obraData={{ obra: o, unidad: u, plaza: p }} onUpdate={updateObra} />;
    }
    return null;
  }

  return (
    <div style={{ display: "flex", minHeight: "100vh" }}>
      {modal?.type === "plaza" && <FPlaza data={data} onSave={addPlaza} onClose={() => setModal(null)} />}
      {modal?.type === "obra" && <FObra data={data} onSave={addObra} onClose={() => setModal(null)} ctx={modal.ctx} />}
      <Sidebar view={view} setView={setView} data={data} onAddPlaza={() => setModal({ type: "plaza" })} onAddObra={ctx => setModal({ type: "obra", ctx })} />
      <div style={{ flex: 1, overflowY: "auto", overflowX: "hidden", minWidth: 0 }}>{renderMain()}</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
