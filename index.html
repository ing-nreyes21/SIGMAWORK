function calcC(c) {
  const cvTotal = (c.convenios || []).reduce((s, v) => s + fmt.num(v.montoDelta), 0);
  const ma = fmt.num(c.montoOriginal) + cvTotal;
  const ant = fmt.num(c.montoOriginal) * (fmt.num(c.anticipoPct) / 100);

      var linkedPartidas = [];

      });
      var contTotal = linkedPartidas.reduce((s, cp) => s + (cp.conceptos || []).reduce((s2, cn) => s2 + fmt.num(cn.cantContratada) * fmt.num(cn.precioUnitario), 0), 0);
      var status = pp.noEjecutable ? "no-ejecutable" : linkedPartidas.length === 0 ? "pendiente" : contTotal > paramTotal ? "sobrecosto" : contTotal < paramTotal ? "ahorro" : "igual";
      return { id: pp.id, nombre: pp.nombre, tipo: pp.tipo || "HC", noEjecutable: pp.noEjecutable || false, paramTotal, contTotal, varianza: paramTotal - contTotal, status, linkedCount: linkedPartidas.length };
    });

      (ct.partidas || []).forEach(cp => {
        if (!cp.parametricaRef) {

      });
    });
    var totalExtras = extras.reduce((s, e) => s + e.monto, 0);
    var totalNoEjec = compPartidas.filter(p => p.noEjecutable).reduce((s, p) => s + p.paramTotal, 0);
    var totalPendiente = compPartidas.filter(p => p.status === "pendiente").reduce((s, p) => s + p.paramTotal, 0);
    var totalAhorro = compPartidas.filter(p => p.status === "ahorro").reduce((s, p) => s + p.varianza, 0) + totalNoEjec - totalExtras;
    comparativo = { partidas: compPartidas, extras, totalExtras, totalNoEjec, totalPendiente, totalAhorro };
  }
  // HC/SC breakdown
  const tcHC = (o.contratos || []).filter(c => c.tipoContrato === "HC").reduce((s, c) => s + calcC(c).ma, 0);
  const tcSC = (o.contratos || []).filter(c => c.tipoContrato === "SC").reduce((s, c) => s + calcC(c).ma, 0);
  // Latest parametric HC/SC
  var lastParam = null;
  if ((o.parametricos || []).length > 0) {
    lastParam = [...o.parametricos].sort((a, b) => a.clase - b.clase)[0];
  }
  const paramHC = lastParam ? (fmt.num(lastParam.montoHC) || 0) : 0;
  const paramSC = lastParam ? (fmt.num(lastParam.montoSC) || 0) : 0;
  const paramTotal = lastParam ? fmt.num(lastParam.monto) : 0;
  // Techo history
  const historialTechos = o.historialTechos || [];
  return { tc, varianza: t - tc, pct, cl, tp, sem: pct <= 90 ? "green" : pct <= 100 ? "yellow" : "red",
    tcHC, tcSC, paramHC, paramSC, paramTotal, historialTechos, comparativo,
    sobrecostoHC: paramHC > 0 && tcHC > paramHC,
    sobrecostoSC: paramSC > 0 && tcSC > paramSC };
}
function calcP(p) { return (p.obras || []).reduce((a, o) => { const c = calcO(o); return { aut: a.aut + fmt.num(o.presupuestoAutorizado), cont: a.cont + c.tc, pag: a.pag + c.tp }; }, { aut: 0, cont: 0, pag: 0 }); }
function calcU(u) { return (u.plazas || []).reduce((a, p) => { const c = calcP(p); return { aut: a.aut + c.aut, cont: a.cont + c.cont, pag: a.pag + c.pag }; }, { aut: 0, cont: 0, pag: 0 }); }

                      {["Descripción", "Unidad", "Cantidad", "P.U.", "Total", ""].map(h => (
                        <th key={h} style={{ padding: "8px 11px", textAlign: "left", fontFamily: "JetBrains Mono", fontSize: 9, color: "#6A8AB5", letterSpacing: "0.06em", textTransform: "uppercase", fontWeight: 500, borderBottom: "1px solid #1E1E50" }}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {p.conceptos.map(cn => {
                      const tot = fmt.num(cn.cantidad) * fmt.num(cn.precioUnitario);
                      return (
                        <tr key={cn.id} style={{ borderBottom: "1px solid #1E1E50" }}>
                          <td style={{ padding: "7px 11px" }}><input className="inf" value={cn.descripcion} onChange={e => upC(p.id, cn.id, "descripcion", e.target.value)} placeholder="Descripción" style={{ fontSize: 12, padding: "5px 9px" }} /></td>
                          <td style={{ padding: "7px 9px", width: 76 }}>
                            <select className="inf" value={cn.unidad} onChange={e => upC(p.id, cn.id, "unidad", e.target.value)} style={{ fontSize: 12, padding: "5px 7px" }}>
                              {["m²","m³","ml","pza","kg","ton","lt","hr","gl","lote","%","global"].map(u => <option key={u} value={u}>{u}</option>)}
                            </select>
                          </td>
                          <td style={{ padding: "7px 9px", width: 100 }}><input className="inf" value={cn.cantidad} onChange={e => upC(p.id, cn.id, "cantidad", e.target.value)} type="number" placeholder="0" style={{ fontSize: 12, padding: "5px 9px" }} /></td>
                          <td style={{ padding: "7px 9px", width: 130 }}><input className="inf" value={cn.precioUnitario} onChange={e => upC(p.id, cn.id, "precioUnitario", e.target.value)} type="number" placeholder="0.00" style={{ fontSize: 12, padding: "5px 9px" }} /></td>
                          <td style={{ padding: "7px 11px", fontFamily: "JetBrains Mono", fontSize: 12, color: tot > 0 ? (p.tipo === "HC" ? "#2B6FD4" : "#F0B429") : "#6A8AB5", fontWeight: tot > 0 ? 600 : 400 }}>{tot > 0 ? fmtDec(tot) : "—"}</td>
                          <td style={{ padding: "7px 9px" }}><button className="ab d" onClick={() => delC(p.id, cn.id)}>✕</button></td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            )}
            <div style={{ padding: "9px 14px" }}><button className="ab" onClick={() => addC(p.id)}>+ Concepto</button></div>
          </div>
        );
      })}

      <div className="divider" />
      <div style={{ background: f.esTecho ? "rgba(11,205,211,.08)" : "rgba(30,30,80,.4)", border: "1px solid " + (f.esTecho ? "rgba(11,205,211,.3)" : "#1E1E50"), borderRadius: 9, padding: "14px 16px", marginBottom: 14 }}>
        <label style={{ display: "flex", alignItems: "flex-start", gap: 12, cursor: "pointer" }}>
          <input type="checkbox" checked={f.esTecho} onChange={e => s("esTecho", e.target.checked)}
            style={{ width: 16, height: 16, marginTop: 2, accentColor: "#0BCDD3", cursor: "pointer", flexShrink: 0 }} />
          <div>
            <div style={{ fontFamily: "Work Sans", fontWeight: 700, fontSize: 13, color: f.esTecho ? "#0BCDD3" : "#E8EDF8", marginBottom: 3 }}>
              {hayTecho ? "Actualizar el Techo Presupuestal" : "Establecer como Techo Presupuestal"}
            </div>
            <div style={{ fontSize: 12, color: "#7A92B5", lineHeight: 1.5 }}>
              {hayTecho ? "Techo actual " + fmt.currency(obra.presupuestoAutorizado) + " → " + fmtDec(montoTotal) + ". El anterior quedará en historial." : "Este monto se establecerá como el techo máximo de la obra."}
            </div>
          </div>
        </label>
      </div>

      <MFooter onClose={onClose} onSave={() => ok && onSave({ ...f, clase: parseInt(f.clase), monto: montoTotal, montoHC, montoSC, id: uid() })} label="Registrar Paramétrico" disabled={!ok} />
    </Modal>
  );
}

function FContrato({ obra, onSave, onClose, edit }) {
  const [f, setF] = useState({
    numero: edit?.numero || "",
    contratista: edit?.contratista || "",
    fechaFirma: edit?.fechaFirma || "",
    anticipoPct: edit?.anticipoPct || 20,
    retencionPct: edit?.retencionPct || 5,
    clasificacion: edit?.clasificacion || "normal",
    estado: edit?.estado || "activo",
    tipoContrato: edit?.tipoContrato || "",
    partidas: edit?.partidas || [],
  });
  const s = (k, v) => setF(x => ({ ...x, [k]: v }));

  // ── Monto calculado automáticamente desde partidas ────────────
  const montoCalculado = f.partidas.reduce((s, p) =>
    s + p.conceptos.reduce((s2, c) => s2 + fmt.num(c.cantContratada) * fmt.num(c.precioUnitario), 0), 0);
  const fmtDec = n => new Intl.NumberFormat("es-MX", { style: "currency", currency: "MXN", minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(n || 0);

  const ant = montoCalculado * (fmt.num(f.anticipoPct) / 100);
  const otros = (obra.contratos || []).filter(c => !edit || c.id !== edit.id).reduce((s, c) => s + calcC(c).ma, 0);
  const proy = otros + montoCalculado;
  const sob = proy > fmt.num(obra.presupuestoAutorizado);
  const ok = f.numero && f.contratista && f.fechaFirma && f.tipoContrato && montoCalculado > 0;

  // Get techo parametric partidas for linking
  var techoParamPartidas = [];
  var tp = (obra.parametricos || []).find(p => p.esTecho);
  if (tp) techoParamPartidas = tp.partidas || [];

  const addP = () => s("partidas", [...f.partidas, { id: uid(), nombre: "", conceptos: [], parametricaRef: "" }]);
  const upP = (pid, k, v) => s("partidas", f.partidas.map(p => p.id === pid ? { ...p, [k]: v } : p));
  const delP = (pid) => s("partidas", f.partidas.filter(p => p.id !== pid));
  const addC = (pid) => s("partidas", f.partidas.map(p => p.id === pid ? { ...p, conceptos: [...p.conceptos, { id: uid(), descripcion: "", unidad: "m²", cantContratada: "", precioUnitario: "", cantEjecutada: 0 }] } : p));
  const upC = (pid, cid, k, v) => s("partidas", f.partidas.map(p => p.id === pid ? { ...p, conceptos: p.conceptos.map(c => c.id === cid ? { ...c, [k]: v } : c) } : p));
  const delC = (pid, cid) => s("partidas", f.partidas.map(p => p.id === pid ? { ...p, conceptos: p.conceptos.filter(c => c.id !== cid) } : p));

  function save() {
    if (!ok) return;
    onSave({
      ...f,
      montoOriginal: montoCalculado,
      anticipoPct: fmt.num(f.anticipoPct),
      retencionPct: fmt.num(f.retencionPct),
      id: edit?.id || uid(),
      convenios: edit?.convenios || [],
      estimaciones: edit?.estimaciones || [],
      deductivas: edit?.deductivas || []
    });
  }

  return (
    <Modal title={edit ? "Editar Contrato" : "Nuevo Contrato"} onClose={onClose} wide>
      {sob && <ABox msg={"Este contrato genera sobrecosto de " + fmt.currency(proy - fmt.num(obra.presupuestoAutorizado)) + " sobre el techo"} />}

      <SecTitle>Datos Generales</SecTitle>
      <G2>
        <Field label="Número de Contrato" req><Inp value={f.numero} onChange={v => s("numero", v)} placeholder="CT-2024-001" /></Field>
        <Field label="Contratista" req><Inp value={f.contratista} onChange={v => s("contratista", v)} placeholder="Razón social del contratista" /></Field>
      </G2>
      <G3>
        <Field label="Fecha de Firma" req><Inp value={f.fechaFirma} onChange={v => s("fechaFirma", v)} type="date" /></Field>
        <Field label="Clasificación" req><Sel value={f.clasificacion} onChange={v => s("clasificacion", v)} options={CLASIFS_CT.map(c => ({ value: c.value, label: c.label }))} /></Field>
        <Field label="Estado"><Sel value={f.estado} onChange={v => s("estado", v)} options={[{ value: "activo", label: "Activo" }, { value: "cerrado", label: "Cerrado" }, { value: "en_convenio", label: "En Convenio" }]} /></Field>
        <Field label="Tipo de Costo" req hint="Hard Cost = construcción directa · Soft Cost = honorarios, permisos, gestión"><Sel value={f.tipoContrato} onChange={v => s("tipoContrato", v)} options={TIPOS_COSTO.map(t => ({ value: t.value, label: t.label }))} /></Field>
      </G3>

      <div className="divider" />
      <SecTitle>Condiciones Financieras</SecTitle>
      <G3>
        <Field label="Anticipo (%)" hint={"= " + fmtDec(ant)}>
          <Inp value={f.anticipoPct} onChange={v => s("anticipoPct", v)} type="number" min="0" placeholder="20" />
        </Field>
        <Field label="Retención Garantía (%)">
          <Inp value={f.retencionPct} onChange={v => s("retencionPct", v)} type="number" min="0" placeholder="5" />
        </Field>
        <Field label="Monto del Contrato" hint="Calculado automáticamente">
          <div style={{ padding: "10px 13px", background: "#080818", border: "1px solid " + (montoCalculado > 0 ? "#0BCDD3" : "#1E1E50"), borderRadius: 7, fontFamily: "JetBrains Mono", fontSize: 15, color: montoCalculado > 0 ? "#0BCDD3" : "#5A6A90", fontWeight: 700, letterSpacing: "-0.01em" }}>
            {montoCalculado > 0 ? fmtDec(montoCalculado) : "—"}
          </div>
        </Field>
      </G3>

      {montoCalculado > 0 && (
        <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 10, padding: "13px", background: "#080818", borderRadius: 8, border: "1px solid #1E1E50", marginBottom: 14 }}>
          <div>
            <div style={{ fontFamily: "JetBrains Mono", fontSize: 9, color: "#6A8AB5", marginBottom: 4, textTransform: "uppercase" }}>Monto Contrato</div>
            <Mn color="#0BCDD3" size={13}>{fmtDec(montoCalculado)}</Mn>
          </div>
          <div>
            <div style={{ fontFamily: "JetBrains Mono", fontSize: 9, color: "#6A8AB5", marginBottom: 4, textTransform: "uppercase" }}>Anticipo a Erogar</div>
            <Mn color="#00A86B" size={13}>{fmtDec(ant)}</Mn>
          </div>
          <div>
            <div style={{ fontFamily: "JetBrains Mono", fontSize: 9, color: "#6A8AB5", marginBottom: 4, textTransform: "uppercase" }}>Varianza vs Techo</div>
            <Mn color={sob ? "#E8344A" : "#00A86B"} size={13}>{fmtDec(fmt.num(obra.presupuestoAutorizado) - proy)}</Mn>
          </div>
        </div>
      )}

      <div className="divider" />
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
        <SecTitle>Partidas y Conceptos</SecTitle>
        <button className="bg2" onClick={addP} style={{ fontSize: 12, padding: "6px 12px" }}>+ Partida</button>
      </div>
      {f.partidas.length === 0 && (
        <div style={{ textAlign: "center", padding: "20px", color: "#6A8AB5", fontSize: 13, border: "1px dashed #1E1E50", borderRadius: 8, marginBottom: 14 }}>
          Sin partidas. El monto del contrato se calcula sumando todos los conceptos.
        </div>
      )}
      {f.partidas.map((p, pi) => {
        const subtotalPartida = p.conceptos.reduce((s, c) => s + fmt.num(c.cantContratada) * fmt.num(c.precioUnitario), 0);
        return (
          <div key={p.id} style={{ background: "#0D0C22", border: "1px solid #1E1E50", borderRadius: 9, marginBottom: 10, overflow: "hidden" }}>
            <div style={{ padding: "11px 14px", display: "flex", gap: 10, alignItems: "center", borderBottom: "1px solid #1E1E50", flexWrap: "wrap" }}>
              <input className="inf" value={p.nombre} onChange={e => upP(p.id, "nombre", e.target.value)} placeholder={"Partida " + (pi + 1)} style={{ flex: 1, minWidth: 160, fontSize: 13, fontWeight: 600 }} />
              {techoParamPartidas.length > 0 && (
                <select className="inf" value={p.parametricaRef || ""} onChange={e => upP(p.id, "parametricaRef", e.target.value)}
                  style={{ fontSize: 11, padding: "5px 8px", minWidth: 180, color: p.parametricaRef ? "#0BCDD3" : "#6A8AB5" }}>
                  <option value="">Sin vinculación paramétrica</option>
                  {techoParamPartidas.map(tp2 => <option key={tp2.id} value={tp2.id}>{tp2.nombre} ({tp2.tipo || "HC"})</option>)}
                </select>
              )}
              {subtotalPartida > 0 && <span style={{ fontFamily: "JetBrains Mono", fontSize: 12, color: "#0BCDD3", whiteSpace: "nowrap" }}>{fmtDec(subtotalPartida)}</span>}
              <label style={{ display: "flex", alignItems: "center", gap: 6, cursor: "pointer", padding: "4px 8px", borderRadius: 5, background: p.noEjecutable ? "rgba(232,52,74,.1)" : "transparent", border: p.noEjecutable ? "1px solid rgba(232,52,74,.3)" : "1px solid transparent" }}>
                <input type="checkbox" checked={p.noEjecutable || false} onChange={e => upP(p.id, "noEjecutable", e.target.checked)} style={{ accentColor: "#E8344A", cursor: "pointer" }} />
                <span style={{ fontFamily: "JetBrains Mono", fontSize: 9, color: p.noEjecutable ? "#E8344A" : "#6A8AB5", textTransform: "uppercase", whiteSpace: "nowrap" }}>No ejecutable</span>
              </label>
              <button className="ab d" onClick={() => delP(p.id)}>✕</button>
            </div>
            {p.conceptos.length > 0 && (
              <div style={{ overflowX: "auto" }}>
                <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
                  <thead>
                    <tr style={{ background: "#080818" }}>
                      {["Descripción", "Unidad", "Cantidad", "P.U.", "Total", ""].map(h => (
                        <th key={h} style={{ padding: "8px 11px", textAlign: "left", fontFamily: "JetBrains Mono", fontSize: 9, color: "#6A8AB5", letterSpacing: "0.06em", textTransform: "uppercase", fontWeight: 500, borderBottom: "1px solid #1E1E50" }}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {p.conceptos.map(cn => {
                      const tot = fmt.num(cn.cantContratada) * fmt.num(cn.precioUnitario);
                      return (
                        <tr key={cn.id} style={{ borderBottom: "1px solid #1E1E50" }}>
                          <td style={{ padding: "7px 11px" }}>
                            <input className="inf" value={cn.descripcion} onChange={e => upC(p.id, cn.id, "descripcion", e.target.value)} placeholder="Descripción" style={{ fontSize: 12, padding: "5px 9px" }} />
                          </td>
                          <td style={{ padding: "7px 9px", width: 76 }}>
                            <select className="inf" value={cn.unidad} onChange={e => upC(p.id, cn.id, "unidad", e.target.value)} style={{ fontSize: 12, padding: "5px 7px" }}>
                              {["m²","m³","ml","pza","kg","ton","lt","hr","gl","lote"].map(u => <option key={u} value={u}>{u}</option>)}
                            </select>
                          </td>
                          <td style={{ padding: "7px 9px", width: 100 }}>
                            <input className="inf" value={cn.cantContratada} onChange={e => upC(p.id, cn.id, "cantContratada", e.target.value)} type="number" placeholder="0" style={{ fontSize: 12, padding: "5px 9px" }} />
                          </td>
                          <td style={{ padding: "7px 9px", width: 130 }}>
                            <input className="inf" value={cn.precioUnitario} onChange={e => upC(p.id, cn.id, "precioUnitario", e.target.value)} type="number" placeholder="0.00" style={{ fontSize: 12, padding: "5px 9px" }} />
                          </td>
                          <td style={{ padding: "7px 11px", whiteSpace: "nowrap", fontFamily: "JetBrains Mono", fontSize: 12, color: tot > 0 ? "#0BCDD3" : "#5A6A90", fontWeight: tot > 0 ? 600 : 400 }}>
                            {tot > 0 ? fmtDec(tot) : "—"}
                          </td>
                          <td style={{ padding: "7px 9px" }}><button className="ab d" onClick={() => delC(p.id, cn.id)}>✕</button></td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            )}
            <div style={{ padding: "9px 14px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <button className="ab" onClick={() => addC(p.id)}>+ Concepto</button>
            </div>
          </div>
        );
      })}

      {montoCalculado > 0 && (
        <div style={{ display: "flex", justifyContent: "space-between", padding: "12px 4px", borderTop: "2px solid #1E1E50", marginTop: 4 }}>
          <span style={{ fontFamily: "Work Sans", fontWeight: 700, fontSize: 13, color: "#E8EDF8" }}>TOTAL DEL CONTRATO</span>
          <span style={{ fontFamily: "JetBrains Mono", fontWeight: 700, fontSize: 15, color: "#0BCDD3" }}>{fmtDec(montoCalculado)}</span>
        </div>
      )}

      {!ok && montoCalculado === 0 && f.partidas.length > 0 && (
        <div style={{ fontSize: 12, color: "#F0B429", padding: "8px 0" }}>⚠ Agrega cantidades y precios unitarios a los conceptos para calcular el monto.</div>
      )}

      <MFooter onClose={onClose} onSave={save} label={edit ? "Actualizar Contrato" : "Registrar Contrato"} disabled={!ok} />
    </Modal>
  );
}

function FEstimacion({ contrato, onSave, onClose }) {
  const numSig = (contrato.estimaciones?.length || 0) + 1;
  const [f, setF] = useState({ numero: numSig, fecha: "", periodo: "", status: "generada", amortizacionAnticipo: contrato.anticipoPct || 20, retencion: contrato.retencionPct || 5, conceptosEjec: {} });
  const s = (k, v) => setF(x => ({ ...x, [k]: v }));
  const setCQ = (cid, v) => setF(x => ({ ...x, conceptosEjec: { ...x.conceptosEjec, [cid]: v } }));
  const allC = [];
  (contrato.partidas || []).forEach(p => p.conceptos.forEach(c => allC.push({ ...c, partidaNombre: p.nombre })));
  const subtotal = allC.reduce((s, c) => s + fmt.num(f.conceptosEjec[c.id] || 0) * fmt.num(c.precioUnitario), 0);
  const amort = subtotal * fmt.num(f.amortizacionAnticipo) / 100;
  const ret = subtotal * fmt.num(f.retencion) / 100;
  const neto = subtotal - amort - ret;
  const ok = f.fecha && f.periodo && subtotal > 0;
  function save() {
    if (!ok) return;
    const conceptos = allC.filter(c => fmt.num(f.conceptosEjec[c.id]) > 0).map(c => ({ conceptoId: c.id, cantidad: fmt.num(f.conceptosEjec[c.id]), monto: fmt.num(f.conceptosEjec[c.id]) * fmt.num(c.precioUnitario) }));
    onSave({ ...f, conceptos, subtotal, amortizacionAnticipo: fmt.num(f.amortizacionAnticipo), retencion: fmt.num(f.retencion), id: uid() });
  }
  return (
    <Modal title={"Estimación #" + (numSig) + " — " + (contrato.contratista)} onClose={onClose} wide>
      <Grid3>
        <Field label="Fecha" req><Inp value={f.fecha} onChange={v => s("fecha", v)} type="date" /></Field>
        <Field label="Período" req><Inp value={f.periodo} onChange={v => s("periodo", v)} placeholder="Ej. Julio 2024" /></Field>
        <Field label="Status"><Sel value={f.status} onChange={v => s("status", v)} options={STATUS_E.map(x => ({ value: x, label: x.charAt(0).toUpperCase() + x.slice(1) }))} /></Field>
      </Grid3>
      <Grid2>
        <Field label="Amortización Anticipo (%)" hint={"= " + (fmt.currency(amort))}><Inp value={f.amortizacionAnticipo} onChange={v => s("amortizacionAnticipo", v)} type="number" min="0" /></Field>
        <Field label="Retención de Garantía (%)" hint={"= " + (fmt.currency(ret))}><Inp value={f.retencion} onChange={v => s("retencion", v)} type="number" min="0" /></Field>
      </Grid2>
      <div className="divider" />
      <SectionTitle>Cantidades Ejecutadas Esta Estimación</SectionTitle>
      {allC.length === 0 ? (
        <div style={{ color: "#6A7DA0", fontSize: 13, padding: "12px 0" }}>El contrato no tiene conceptos registrados.</div>
      ) : (
        <div style={{ background: T.bg, border: "1px solid " + T.border, borderRadius: 9, overflow: "hidden", marginBottom: 16 }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
            <thead>
              <tr style={{ background: T.surfaceAlt }}>
                {["Concepto", "Partida", "Unidad", "Pendiente", "Esta Est.", "Monto"].map(h => (
                  <th key={h} style={{ padding: "9px 12px", textAlign: "left", fontFamily: "JetBrains Mono", fontSize: 9, color: "#6A7DA0", letterSpacing: "0.06em", textTransform: "uppercase", fontWeight: 500 }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {allC.map(c => {
                const qty = fmt.num(f.conceptosEjec[c.id] || 0);
                const pend = fmt.num(c.cantContratada) - fmt.num(c.cantEjecutada);
                return (
                  <tr key={c.id} className="rh" style={{ borderTop: "1px solid " + T.border }}>
                    <td style={{ padding: "9px 12px" }}>{c.descripcion}</td>
                    <td style={{ padding: "9px 12px", color: "#6A7DA0", fontSize: 11 }}>{c.partidaNombre}</td>
                    <td style={{ padding: "9px 12px" }}><Mn color={T.textMuted} size={11}>{c.unidad}</Mn></td>
                    <td style={{ padding: "9px 12px" }}><Mn color={pend <= 0 ? T.green : T.textPrimary} size={11}>{pend.toLocaleString()}</Mn></td>
                    <td style={{ padding: "9px 10px", width: 100 }}>
                      <input className="inf" value={f.conceptosEjec[c.id] || ""} onChange={e => setCQ(c.id, e.target.value)} type="number" min="0" placeholder="0" style={{ fontSize: 12, padding: "5px 8px" }} />
                    </td>
                    <td style={{ padding: "9px 12px" }}><Mn color={qty > 0 ? T.green : T.textMuted} size={12}>{qty > 0 ? fmt.currency(qty * fmt.num(c.precioUnitario)) : "—"}</Mn></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 10, padding: "13px", background: T.surfaceAlt, borderRadius: 9, border: "1px solid " + T.border }}>
        {[{ l: "Subtotal Bruto", v: fmt.currency(subtotal), c: T.textPrimary }, { l: "Amortización", v: "- " + (fmt.currency(amort)), c: T.yellow }, { l: "Retención", v: "- " + (fmt.currency(ret)), c: T.orange }, { l: "Neto a Pagar", v: fmt.currency(neto), c: T.green }].map((k, i) => (
          <div key={i}><div style={{ fontFamily: "JetBrains Mono", fontSize: 9, color: "#6A7DA0", marginBottom: 5, textTransform: "uppercase" }}>{k.l}</div><Mn color={k.c} size={14}>{k.v}</Mn></div>
        ))}
      </div>
      <ModalFooter onClose={onClose} onSave={save} label="Registrar Estimación" disabled={!ok} />
    </Modal>
  );
}

// ─── DASHBOARD ───────────────────────────────────────────────────
function Dashboard({ data }) {
  const [filtroAño, setFiltroAño] = useState("todos");
  const añosDisponibles = [...new Set(data.unidades.flatMap(u => u.plazas.flatMap(p => p.obras.map(o => o.añoAutorizacion || new Date().getFullYear()))))].sort();
  function obraVisible(o){ return filtroAño === "todos" || (o.añoAutorizacion || new Date().getFullYear()) === parseInt(filtroAño); }
  const obras = data.unidades.flatMap(u => u.plazas.flatMap(p => p.obras.filter(o => obraVisible(o)).map(o => ({ o, u, p }))));
  const tots = obras.reduce((a, { o }) => { const oc = calcO(o); return { aut: a.aut + fmt.num(o.presupuestoAutorizado), cont: a.cont + oc.tc, pag: a.pag + oc.tp }; }, { aut: 0, cont: 0, pag: 0 });
  const sems = obras.reduce((a, { o }) => { a[calcO(o).sem]++; return a; }, { green: 0, yellow: 0, red: 0 });

  return (
    <div className="fade-in" style={{ padding: "24px 28px" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 26 }}>
        <div>
          <div style={{ fontFamily: "Work Sans", fontWeight: 800, fontSize: 24, letterSpacing: "-0.01em", marginBottom: 3 }}>Dashboard General</div>
          <div style={{ color: "#6A7DA0", fontSize: 13 }}>Portafolio consolidado · {obras.length} obras{filtroAño !== "todos" ? " · Año " + (filtroAño) : ""} · {data.unidades.length} unidades</div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <span style={{ fontFamily: "JetBrains Mono", fontSize: 10, color: "#7A92B5", letterSpacing: "0.08em", textTransform: "uppercase" }}>AÑO:</span>
          <select value={filtroAño} onChange={function(e){ setFiltroAño(e.target.value); }}
            style={{ fontFamily: "JetBrains Mono", fontSize: 12, fontWeight: 600, padding: "7px 14px", borderRadius: 7, border: "1px solid #1E1E50", background: "#080818", color: "#0BCDD3", cursor: "pointer", outline: "none", minWidth: 140 }}>
            <option value="todos">Todos los años</option>
            {añosDisponibles.map(function(a){ return React.createElement("option", {key: a, value: String(a)}, a); })}
          </select>
        </div> </div>

      {/* KPIs */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 14, marginBottom: 20 }}>
        {[
          { l: "Presupuesto Autorizado", v: fmt.currency(tots.aut), acc: T.textPrimary },
          { l: "Total Contratado", v: fmt.currency(tots.cont), acc: T.blue, sub: fmt.pct((tots.cont / tots.aut) * 100) + " del techo" },
          { l: tots.cont > tots.aut ? "Sobrecosto" : "Ahorro", v: fmt.currency(Math.abs(tots.aut - tots.cont)), acc: tots.cont > tots.aut ? T.red : T.green },
          { l: "Total Pagado", v: fmt.currency(tots.pag), acc: T.yellow, sub: fmt.pct((tots.pag / tots.cont) * 100) + " del contratado" },
        ].map((k, i) => (
          <div key={i} className="card" style={{ padding: "18px 18px 14px" }}>
            <div style={{ fontFamily: "JetBrains Mono", fontSize: 9, color: "#6A7DA0", letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 9 }}>{k.l}</div>
            <div style={{ fontFamily: "Work Sans", fontWeight: 700, fontSize: 20, color: k.acc, marginBottom: 3 }}>{k.v}</div>
            {k.sub && <div style={{ fontSize: 11, color: "#6A7DA0" }}>{k.sub}</div>}
          </div>
        ))}
      </div>

      {/* Progress */}
      <div className="card" style={{ padding: 18, marginBottom: 18 }}>
        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 9 }}>

            <div key={u.id} className="card" style={{ padding: 18 }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 14 }}>

                  <div style={{ fontFamily: "Work Sans", fontWeight: 700, fontSize: 13, color: u.color, marginBottom: 3 }}>{u.nombre.toUpperCase()}</div>

              </div>
              <PBar pct={pct} color={u.color} />
            </div>
          );
        })}
      </div>

      {/* Health */}
      {filtroAño === "todos" && añosDisponibles.length > 0 && (
        <div className="card" style={{ padding: 18, marginBottom: 18 }}>
          <div style={{ fontFamily: "Work Sans", fontWeight: 600, fontSize: 13, marginBottom: 16 }}>Resumen por Año</div>

            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
              <thead>
                <tr style={{ background: "#0D0C22" }}>

                    <th key={h} style={{ padding: "10px 14px", textAlign: h === "Año" ? "left" : "right", fontFamily: "JetBrains Mono", fontSize: 9, color: "#7A92B5", letterSpacing: "0.08em", textTransform: "uppercase", fontWeight: 500 }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {añosDisponibles.map(año => {
                  const od = data.unidades.flatMap(u => u.plazas.flatMap(p => p.obras.filter(o => (o.añoAutorizacion || new Date().getFullYear()) === año)));
                  const t = od.reduce((a, o) => { const oc = calcO(o); return { aut: a.aut + fmt.num(o.presupuestoAutorizado), cont: a.cont + oc.tc, pag: a.pag + oc.tp }; }, { aut: 0, cont: 0, pag: 0 });
                  const pct = t.aut > 0 ? (t.cont / t.aut) * 100 : 0;
                  const pateadas = od.filter(o => (o.historialAños || []).length > 0).length;
                  return (
                    <tr key={año} style={{ borderTop: "1px solid #1E1E50", cursor: "pointer" }} onClick={() => setFiltroAño(String(año))}>
                      <td style={{ padding: "12px 14px" }}>

                      </td>
                      <td style={{ padding: "12px 14px", textAlign: "right", fontFamily: "JetBrains Mono", fontSize: 11, color: "#8A9DC0" }}>{od.length}</td>
                      <td style={{ padding: "12px 14px", textAlign: "right", fontFamily: "JetBrains Mono", fontSize: 12, color: "#E8EDF8" }}>{fmt.currency(t.aut)}</td>
                      <td style={{ padding: "12px 14px", textAlign: "right", fontFamily: "JetBrains Mono", fontSize: 12, color: "#0BCDD3" }}>{fmt.currency(t.cont)}</td>
                      <td style={{ padding: "12px 14px", textAlign: "right", fontFamily: "JetBrains Mono", fontSize: 12, color: "#F0B429" }}>{fmt.currency(t.pag)}</td>
                      <td style={{ padding: "12px 14px", textAlign: "right" }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 8, justifyContent: "flex-end" }}>
                          <div style={{ width: 60, height: 3, background: "#1E1E50", borderRadius: 2, overflow: "hidden" }}>
                            <div style={{ width: (Math.min(pct, 100)) + "%", height: "100%", background: pct > 100 ? "#E8344A" : pct > 90 ? "#F0B429" : "#00A86B", borderRadius: 2 }} />
                          </div>
                          <span style={{ fontFamily: "JetBrains Mono", fontSize: 11, color: pct > 100 ? "#E8344A" : pct > 90 ? "#F0B429" : "#00A86B", minWidth: 40, textAlign: "right" }}>{fmt.pct(pct)}</span>
                        </div>
                      </td>
                      <td style={{ padding: "12px 14px", textAlign: "right" }}>
                        {pateadas > 0 ? <span style={{ fontFamily: "JetBrains Mono", fontSize: 11, color: "#F0B429" }}>⟳ {pateadas}</span> : <span style={{ fontFamily: "JetBrains Mono", fontSize: 11, color: "#7A92B5" }}>—</span>}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
          <div style={{ marginTop: 10, fontSize: 11, color: "#7A92B5" }}>Haz clic en un año para filtrar el dashboard.</div>
        </div>
      )}

      <div className="card" style={{ padding: 18 }}>
        <div style={{ fontFamily: "Work Sans", fontWeight: 600, fontSize: 13, marginBottom: 14 }}>Salud Financiera — {obras.length} Obras</div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 12, marginBottom: 18 }}>
          {[{ tipo: "green", l: "En Control", n: sems.green, d: "< 90% techo" }, { tipo: "yellow", l: "En Alerta", n: sems.yellow, d: "90–100% techo" }, { tipo: "red", l: "Sobrecosto", n: sems.red, d: "> 100% techo" }].map(s => (

              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}><Sem tipo={s.tipo} sz={9} /><span style={{ fontFamily: "Work Sans", fontWeight: 600, fontSize: 12 }}>{s.l}</span></div>
              <div style={{ fontFamily: "Work Sans", fontWeight: 800, fontSize: 28, color: s.tipo === "green" ? T.green : s.tipo === "yellow" ? T.yellow : T.red }}>{s.n}</div>
              <div style={{ fontSize: 11, color: "#6A7DA0", marginTop: 2 }}>{s.d}</div>
            </div>
          ))}
        </div>
        {obras.map(({ o, u, p }) => {
          const oc = calcO(o);
          return (
            <div key={o.id} style={{ display: "flex", alignItems: "center", gap: 12, padding: "9px 0", borderTop: "1px solid " + T.border }}>
              <Sem tipo={oc.sem} />

              </div>
              <div style={{ textAlign: "right", minWidth: 130 }}>
                <Mn color={oc.varianza < 0 ? T.red : T.green} size={12}>{oc.varianza < 0 ? "▲" : "▼"} {fmt.currency(Math.abs(oc.varianza))}</Mn>
                <div style={{ fontSize: 11, color: "#6A7DA0" }}>{fmt.pct(oc.pct)} techo</div>
              </div>
              <div style={{ width: 72 }}><PBar pct={oc.pct} /></div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── FConvenio ────────────────────────────────────────────────────
function FConvenio({ contrato, obra, onSave, onClose }) {
  const fmtDec = n => new Intl.NumberFormat("es-MX",{style:"currency",currency:"MXN",minimumFractionDigits:2,maximumFractionDigits:2}).format(n||0);
  const [f, setF] = useState({
    numero: (contrato.convenios?.length || 0) + 1,
    fecha: "", clasificacion: "", justificacion: "", descripcion: "", adjuntoNombre: "", adjuntoUrl: "",
    partidas: []
  });
  const s = (k, v) => setF(x => ({ ...x, [k]: v }));

  // Partidas management
  const addP = () => s("partidas", [...f.partidas, { id: uid(), nombre: "", tipo: contrato.tipoContrato || "HC", conceptos: [] }]);
  const upP = (pid, k, v) => s("partidas", f.partidas.map(p => p.id === pid ? { ...p, [k]: v } : p));
  const delP = (pid) => s("partidas", f.partidas.filter(p => p.id !== pid));
  const addC = (pid) => s("partidas", f.partidas.map(p => p.id === pid ? { ...p, conceptos: [...p.conceptos, { id: uid(), descripcion: "", unidad: "m²", cantContratada: "", precioUnitario: "" }] } : p));
  const upC = (pid, cid, k, v) => s("partidas", f.partidas.map(p => p.id === pid ? { ...p, conceptos: p.conceptos.map(c => c.id === cid ? { ...c, [k]: v } : c) } : p));
  const delC = (pid, cid) => s("partidas", f.partidas.map(p => p.id === pid ? { ...p, conceptos: p.conceptos.filter(c => c.id !== cid) } : p));

  // Auto-calculate monto from partidas
  const montoCalculado = f.partidas.reduce((s, p) => s + p.conceptos.reduce((s2, c) => s2 + fmt.num(c.cantContratada) * fmt.num(c.precioUnitario), 0), 0);

  const ccActual = calcC(contrato);
  const proyC = ccActual.ma + montoCalculado;
  const otrosC = (obra.contratos || []).filter(c => c.id !== contrato.id).reduce((sum, c) => sum + calcC(c).ma, 0);
  const proyO = otrosC + proyC;
  const sob = proyO > fmt.num(obra.presupuestoAutorizado);
  const ok = f.fecha && f.justificacion && f.clasificacion && montoCalculado > 0;

  return (
    <Modal title={"Convenio #" + f.numero + " — " + contrato.contratista} onClose={onClose} wide>
      {sob && <ABox msg={"Sobrecosto de " + fmt.currency(proyO - fmt.num(obra.presupuestoAutorizado)) + " sobre el techo"} />}

      <G3>
        <Field label="Fecha" req><Inp value={f.fecha} onChange={v => s("fecha", v)} type="date" /></Field>
        <Field label="Clasificación" req>
          <Sel value={f.clasificacion} onChange={v => s("clasificacion", v)} options={CLASIFS.map(c => ({ value: c.value, label: c.label }))} />
        </Field>
        <Field label="Monto Convenio" hint="Calculado automáticamente">
          <div style={{ padding: "10px 13px", background: "#080818", border: "1px solid " + (montoCalculado > 0 ? "#0BCDD3" : "#1E1E50"), borderRadius: 7, fontFamily: "JetBrains Mono", fontSize: 14, color: montoCalculado > 0 ? "#0BCDD3" : "#6A8AB5", fontWeight: 700 }}>
            {montoCalculado > 0 ? fmtDec(montoCalculado) : "—"}
          </div>
        </Field>
      </G3>

      <Field label="Causa (resumen)" req hint="Resumen breve — aparece en reportes">
        <Txta value={f.justificacion} onChange={v => s("justificacion", v)} placeholder="Causa que origina el convenio…" rows={2} />
      </Field>
      <div style={{ marginBottom: 12 }} />
      <Field label="Descripción Técnica" hint="Detalle completo de la condición, alcance del cambio, impacto">
        <Txta value={f.descripcion} onChange={v => s("descripcion", v)} placeholder="Condición física, trabajos adicionales, alcance…" rows={3} />
      </Field>

      <div className="divider" />
      <SecTitle>Documento de Soporte</SecTitle>
      <G2>
        <Field label="Nombre del Documento"><Inp value={f.adjuntoNombre} onChange={v => s("adjuntoNombre", v)} placeholder="Ej. Croquis cimentación norte" /></Field>
        <Field label="Link del Archivo" hint="Google Drive, OneDrive, Dropbox"><Inp value={f.adjuntoUrl} onChange={v => s("adjuntoUrl", v)} placeholder="https://drive.google.com/..." /></Field>
      </G2>

      <div className="divider" />
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
        <SecTitle>Partidas y Conceptos del Convenio</SecTitle>
        <button className="bg2" onClick={addP} style={{ fontSize: 12, padding: "6px 12px" }}>+ Partida</button>
      </div>
      {f.partidas.length === 0 && (
        <div style={{ textAlign: "center", padding: "18px", color: "#6A8AB5", fontSize: 13, border: "1px dashed #1E1E50", borderRadius: 8, marginBottom: 14 }}>
          Agrega las partidas del convenio. El monto se calcula automáticamente.
        </div>
      )}
      {f.partidas.map((p, pi) => {
        const subP = p.conceptos.reduce((s, c) => s + fmt.num(c.cantContratada) * fmt.num(c.precioUnitario), 0);
        return (
          <div key={p.id} style={{ background: "#0D0C22", border: "1px solid #1E1E50", borderRadius: 9, marginBottom: 10, overflow: "hidden" }}>
            <div style={{ padding: "11px 14px", display: "flex", gap: 10, alignItems: "center", borderBottom: "1px solid #1E1E50" }}>
              <input className="inf" value={p.nombre} onChange={e => upP(p.id, "nombre", e.target.value)} placeholder={"Partida " + (pi + 1)} style={{ flex: 1, fontSize: 13, fontWeight: 600 }} />
              {subP > 0 && <Mn color="#0BCDD3" size={12}>{fmtDec(subP)}</Mn>}
              <button className="ab d" onClick={() => delP(p.id)}>✕</button>
            </div>
            {p.conceptos.length > 0 && (
              <div style={{ overflowX: "auto" }}>
                <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
                  <thead>
                    <tr style={{ background: "#080818" }}>
                      {["Descripción","Unidad","Cantidad","P.U.","Total",""].map(h => (
                        <th key={h} style={{ padding: "8px 11px", textAlign: "left", fontFamily: "JetBrains Mono", fontSize: 9, color: "#6A8AB5", textTransform: "uppercase", fontWeight: 500, borderBottom: "1px solid #1E1E50" }}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {p.conceptos.map(cn => {
                      const tot = fmt.num(cn.cantContratada) * fmt.num(cn.precioUnitario);
                      return (
                        <tr key={cn.id} style={{ borderBottom: "1px solid #1E1E50" }}>
                          <td style={{ padding: "7px 11px" }}><input className="inf" value={cn.descripcion} onChange={e => upC(p.id, cn.id, "descripcion", e.target.value)} placeholder="Descripción" style={{ fontSize: 12, padding: "5px 9px" }} /></td>
                          <td style={{ padding: "7px 9px", width: 76 }}>
                            <select className="inf" value={cn.unidad} onChange={e => upC(p.id, cn.id, "unidad", e.target.value)} style={{ fontSize: 12, padding: "5px 7px" }}>
                              {["m²","m³","ml","pza","kg","ton","lt","hr","gl","lote","%","global"].map(u => <option key={u} value={u}>{u}</option>)}
                            </select>
                          </td>
                          <td style={{ padding: "7px 9px", width: 100 }}><input className="inf" value={cn.cantContratada} onChange={e => upC(p.id, cn.id, "cantContratada", e.target.value)} type="number" placeholder="0" style={{ fontSize: 12, padding: "5px 9px" }} /></td>
                          <td style={{ padding: "7px 9px", width: 130 }}><input className="inf" value={cn.precioUnitario} onChange={e => upC(p.id, cn.id, "precioUnitario", e.target.value)} type="number" placeholder="0.00" style={{ fontSize: 12, padding: "5px 9px" }} /></td>
                          <td style={{ padding: "7px 11px", fontFamily: "JetBrains Mono", fontSize: 12, color: tot > 0 ? "#0BCDD3" : "#6A8AB5", fontWeight: tot > 0 ? 600 : 400 }}>{tot > 0 ? fmtDec(tot) : "—"}</td>
                          <td style={{ padding: "7px 9px" }}><button className="ab d" onClick={() => delC(p.id, cn.id)}>✕</button></td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            )}
            <div style={{ padding: "9px 14px" }}><button className="ab" onClick={() => addC(p.id)}>+ Concepto</button></div>
          </div>
        );
      })}

      {montoCalculado > 0 && (
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, padding: "12px 14px", background: "#080818", borderRadius: 8, border: "1px solid #1E1E50", marginTop: 8 }}>
          <div><div style={{ fontFamily: "JetBrains Mono", fontSize: 9, color: "#6A8AB5", marginBottom: 4, textTransform: "uppercase" }}>Monto del Convenio</div><Mn color="#0BCDD3" size={13}>{fmtDec(montoCalculado)}</Mn></div>
          <div><div style={{ fontFamily: "JetBrains Mono", fontSize: 9, color: "#6A8AB5", marginBottom: 4, textTransform: "uppercase" }}>Varianza vs Techo</div><Mn color={sob ? "#E8344A" : "#00A86B"} size={13}>{fmt.currency(fmt.num(obra.presupuestoAutorizado) - proyO)}</Mn></div>
        </div>
      )}

      <MFooter onClose={onClose} onSave={() => ok && onSave({ ...f, montoDelta: montoCalculado, partidas: f.partidas, id: uid() })} label="Registrar Convenio" disabled={!ok} />
    </Modal>
  );
}

// ── FDeductiva ───────────────────────────────────────────────────
function FDeductiva({ contrato, obra, onSave, onClose }) {
  const numeroSig = (contrato.deductivas?.length || 0) + 1;
  const [f, setF] = useState({ numero: numeroSig, fecha: new Date().toISOString().slice(0, 10), descripcion: "", estado: "aprobada" });
  const [cantidades, setCantidades] = useState({});
  const [errores, setErrores] = useState({});
  const sf = (k, v) => setF(x => ({ ...x, [k]: v }));
  const allConceptos = [];
  (contrato.partidas || []).forEach(p => p.conceptos.forEach(c => allConceptos.push({ ...c, partidaNombre: p.nombre })));

  function setCantidad(cid, val) {
    const concepto = allConceptos.find(c => c.id === cid);
    if (!concepto) return;
    const disponible = cantDisponibleDeducir(contrato, concepto);
    const num = fmt.num(val);
    const newErr = { ...errores };
    if (num > disponible) {
      newErr[cid] = "Máximo deducible: " + disponible.toLocaleString() + " " + concepto.unidad + " (" + fmt.num(concepto.cantContratada).toLocaleString() + " contratadas - " + cantDeducidaConcepto(contrato, cid).toLocaleString() + " ya deducidas)";
    } else {
      delete newErr[cid];
    }
    setErrores(newErr);
    setCantidades(prev => ({ ...prev, [cid]: val }));
  }

  const hayErrores = Object.keys(errores).length > 0;
  const conceptosAfect = allConceptos.filter(c => fmt.num(cantidades[c.id]) > 0);
  const montoTotal = conceptosAfect.reduce((s, c) => s - Math.min(fmt.num(cantidades[c.id]), cantDisponibleDeducir(contrato, c)) * fmt.num(c.precioUnitario), 0);
  const ok = f.fecha && f.descripcion && conceptosAfect.length > 0 && !hayErrores;

  function save() {
    if (!ok) return;
    const conceptosDed = conceptosAfect.map(c => ({ conceptoId: c.id, descripcion: c.descripcion, unidad: c.unidad, cantidadDeducida: fmt.num(cantidades[c.id]), precioUnitario: fmt.num(c.precioUnitario), montoDeductiva: -(fmt.num(cantidades[c.id]) * fmt.num(c.precioUnitario)) }));
    onSave({ ...f, conceptos: conceptosDed, montoTotal, id: uid() });
  }

  return (
    <Modal title={"Deductiva #" + numeroSig + " — " + contrato.contratista} onClose={onClose} wide>
      <ABox msg="No se puede deducir más de la cantidad contratada disponible. El sistema bloqueará cantidades fuera de rango." color="#F0B429" />
      <G3>
        <Field label="Fecha" req><Inp value={f.fecha} onChange={v => sf("fecha", v)} type="date" /></Field>
        <Field label="Estado"><Sel value={f.estado} onChange={v => sf("estado", v)} options={[{ value: "aprobada", label: "Aprobada" }, { value: "pendiente", label: "Pendiente" }]} /></Field>
        <Field label="Monto Total Deductiva">
          <div style={{ padding: "10px 13px", background: "#080818", border: "1px solid #1E1E50", borderRadius: 7, fontFamily: "JetBrains Mono", fontSize: 14, color: montoTotal < 0 ? "#00A86B" : "#6A8AB5", fontWeight: 700 }}>
            {montoTotal < 0 ? fmt.currency(montoTotal) : "—"}
          </div>
        </Field>
      </G3>
      <Field label="Descripción del Motivo" req hint="Por qué se genera esta deductiva">
        <Txta value={f.descripcion} onChange={v => sf("descripcion", v)} placeholder="Describe el motivo, trabajos que se reducen o eliminan…" rows={3} />
      </Field>
      <div className="divider" />
      <SecTitle>Conceptos a Deducir</SecTitle>
      {allConceptos.length === 0 ? (
        <div style={{ color: "#6A8AB5", fontSize: 13, padding: "16px 0" }}>El contrato no tiene conceptos registrados.</div>
      ) : (
        <div style={{ background: "#080818", border: "1px solid #1E1E50", borderRadius: 9, overflow: "hidden", marginBottom: 16 }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
            <thead>
              <tr style={{ background: "#0D0C22" }}>
                {["Concepto", "Partida", "Contratado", "Ya Ded.", "Disponible", "A Deducir", "Monto"].map(h => (
                  <th key={h} style={{ padding: "9px 12px", textAlign: "left", fontFamily: "JetBrains Mono", fontSize: 9, color: "#6A8AB5", letterSpacing: "0.06em", textTransform: "uppercase", fontWeight: 500 }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {allConceptos.map(c => {
                const yaDeducido = cantDeducidaConcepto(contrato, c.id);
                const disponible = cantDisponibleDeducir(contrato, c);
                const qty = fmt.num(cantidades[c.id] || 0);
                const error = errores[c.id];
                return (
                  <React.Fragment key={c.id}>
                    <tr style={{ borderTop: "1px solid #1E1E50", background: error ? "rgba(232,52,74,.05)" : qty > 0 ? "rgba(0,168,107,.05)" : "transparent" }}>
                      <td style={{ padding: "9px 12px" }}>{c.descripcion}</td>
                      <td style={{ padding: "9px 12px", color: "#6A8AB5", fontSize: 11 }}>{c.partidaNombre}</td>
                      <td style={{ padding: "9px 12px", fontFamily: "JetBrains Mono", fontSize: 11 }}>{fmt.num(c.cantContratada).toLocaleString()} {c.unidad}</td>
                      <td style={{ padding: "9px 12px", fontFamily: "JetBrains Mono", fontSize: 11, color: yaDeducido > 0 ? "#F0B429" : "#6A8AB5" }}>{yaDeducido > 0 ? yaDeducido.toLocaleString() : "—"}</td>
                      <td style={{ padding: "9px 12px", fontFamily: "JetBrains Mono", fontSize: 11, color: disponible <= 0 ? "#E8344A" : "#00A86B", fontWeight: 600 }}>{disponible <= 0 ? "AGOTADO" : disponible.toLocaleString() + " " + c.unidad}</td>
                      <td style={{ padding: "9px 10px", width: 110 }}>
                        {disponible <= 0 ? <div style={{ fontFamily: "JetBrains Mono", fontSize: 11, color: "#E8344A", padding: "5px 8px" }}>—</div> : (
                          <input className="inf" value={cantidades[c.id] || ""} onChange={e => setCantidad(c.id, e.target.value)} type="number" min="0" max={disponible} placeholder="0"
                            style={{ fontSize: 12, padding: "5px 8px", borderColor: error ? "#E8344A" : qty > 0 ? "#00A86B" : "#1E1E50" }} />
                        )}
                      </td>
                      <td style={{ padding: "9px 12px", fontFamily: "JetBrains Mono", fontSize: 12, color: qty > 0 ? "#00A86B" : "#6A8AB5" }}>
                        {qty > 0 ? "- " + fmt.currency(qty * fmt.num(c.precioUnitario)) : "—"}
                      </td>
                    </tr>
                    {error && (
                      <tr style={{ background: "rgba(232,52,74,.08)" }}>
                        <td colSpan={7} style={{ padding: "6px 12px 8px", fontSize: 11, color: "#E8344A" }}>🚫 {error}</td>
                      </tr>
                    )}
                  </React.Fragment>
                );
              })}
            </tbody>
          </table>
        </div>
      )}
      {hayErrores && <ABox msg="Acción bloqueada. Corrige las cantidades marcadas antes de continuar." />}
      <MFooter onClose={onClose} onSave={save} label={"Registrar Deductiva #" + numeroSig} disabled={!ok} />
    </Modal>
  );
}

        <Field label="Nuevo Año" req><Sel value={f.añoNuevo} onChange={v=>s("añoNuevo",v)} options={años.map(y=>({value:y,label:String(y)}))}/></Field>
